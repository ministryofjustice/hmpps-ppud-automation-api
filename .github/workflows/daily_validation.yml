name: Daily service validation
on:
  schedule:
    - cron: "10 8 * * 1-5"
permissions:
  contents: read
jobs:
  validate:
    uses: ./.github/workflows/validate.yml
    secrets: inherit
  notify_slack_of_failure:
    name: Notify Slack of failure
    if: always() && contains(needs.*.result, 'failure')
    needs:
      - validate
    runs-on: ubuntu-latest
    steps:
      # This first action will tell us what minimum permissions are required to run the job, after which we can
      # remove the action call and set the permissions explicitly.
      - uses: GitHubSecurityLab/actions-permissions/monitor@bf82d13b9b10051d224345ab9184f5ede0a94289 # v1
      - name: Prepare Slack failure message
        run: echo "Daily validation checks failed in ${{ github.repository }}." > results_slack_message.txt
      - name: Notify Slack of failure
        uses: ministryofjustice/hmpps-github-shared-actions/.github/actions/slack_failure_results@6ca6653862e916a9221d915216228aee57717570 # v2
        with:
          channel_id: ${{ vars.PROD_RELEASES_SLACK_CHANNEL }}
          SLACK_BOT_TOKEN: ${{ secrets.HMPPS_SRE_SLACK_BOT_TOKEN }}
          input_file: results_slack_message.txt